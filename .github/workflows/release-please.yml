name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          target-branch: main

      - name: Checkout code
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4

      - name: Setup Go
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Compile for Linux
        if: ${{ steps.release.outputs.release_created }}
        run: |
          # Compiles the Go source into a standalone Linux executable
          GOOS=linux GOARCH=amd64 go build -o tsdeftool-linux main.go

      - name: Compile for Windows
        if: ${{ steps.release.outputs.release_created }}
        run: |
          # Compiles the Go source into a standalone Windows executable
          GOOS=windows GOARCH=amd64 go build -o tsdeftool-windows.exe main.go

      - name: Compile for macOS (Intel)
        if: ${{ steps.release.outputs.release_created }}
        run: |
          GOOS=darwin GOARCH=amd64 go build -o tsdeftool-darwin-amd64 main.go

      - name: Compile for macOS (Apple Silicon)
        if: ${{ steps.release.outputs.release_created }}
        run: |
          GOOS=darwin GOARCH=arm64 go build -o tsdeftool-darwin-arm64 main.go

      - name: Upload Release Assets
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Attaches the compiled binaries to the GitHub Release created by Release Please
          gh release upload ${{ steps.release.outputs.tag_name }} tsdeftool-linux tsdeftool-windows.exe tsdeftool-darwin-amd64 tsdeftool-darwin-arm64
